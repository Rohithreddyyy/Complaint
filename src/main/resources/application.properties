# ================= CORE AI SETTINGS =================
# If these are left as placeholders, the app will fall back to local rule-based AI.
groq.api.key=YOUR_GROQ_API_KEY
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ================= SERVER =================
server.port=8081
server.address=0.0.0.0

# ================= DATABASE CONFIGURATION =================

# --- OPTION A: H2 IN-MEMORY DATABASE (Active by default, no setup required) ---
spring.datasource.url=jdbc:h2:mem:complaint_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- OPTION B: CLOUD MYSQL (AIVEN/RENDER) - Uncomment to use ---
# spring.datasource.url=jdbc:mysql://YOUR_AIVEN_HOST:PORT/defaultdb?ssl-mode=REQUIRED&useSSL=true
# spring.datasource.username=avnadmin
# spring.datasource.password=YOUR_AIVEN_PASSWORD
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================= SECURITY =================
# Google OAuth configuration (Optional: only needed if using Google Login)
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile