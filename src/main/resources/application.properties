# ================= CORE AI SETTINGS =================
groq.api.key=YOUR_GROQ_API_KEY
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ================= SERVER =================
server.port=8081
server.address=0.0.0.0

# ================= DATABASE (CLOUD - AIVEN) =================
spring.datasource.url=jdbc:mysql://YOUR_AIVEN_HOST:PORT/defaultdb?ssl-mode=REQUIRED&useSSL=true
spring.datasource.username=avnadmin
spring.datasource.password=YOUR_AIVEN_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================= SECURITY =================
spring.security.oauth2.client.registration.google.client-id=512956986192-50a4seov98krl5ivq6gjhs1391kbgng2.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=PASTE_REAL_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile