# ================= CORE AI SETTINGS =================
# Pulls from environment variables with safe defaults
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# ================= SERVER =================
server.port=8081
server.address=0.0.0.0

# ================= DATABASE CONFIGURATION =================
# Uses Aiven MySQL if environment variables are provided
spring.datasource.url=${DB_URL:jdbc:h2:mem:complaint_db}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Dialect & Driver (Automatically adjusts based on URL but set here for clarity)
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQL8Dialect}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================= SECURITY =================
# Google OAuth (Optional: pulls from env if available)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.google.scope=email,profile